spring:
  application:
    name: app

  flyway:
    enabled: false

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;MODE=MySQL
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace

oauth:
  kakao:
    base-url: dummy
    client-id: dummy
    client-secret: dummy
    redirect-uri: dummy

jwt:
  issuer: dummy
  secret: dummydummydummydummydummydummydummydummydummydummydummydummydummydummydummydummydummydummy
  atk-expiration-seconds: 10

spring:
  application:
    name: app

  config:
    import: optional:file:.env[.properties]

  profiles:
    include:
      - infra-oauth
    group:
      local:
        - local
        - core-local
        - infra-db-local
      prod:
        - prod
        - core-prod
        - infra-db-prod

management:
  endpoints:
    web:
      exposure:
        include: prometheus, heal